<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <pattern id="nokiatisPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Background -->
      <rect width="100" height="100" fill="rgb(var(--pattern-background))"/>
      <!-- N logo pattern -->
      <g opacity="0.05">
        <path d="M10 20 L10 80 L25 80 L25 50 L75 80 L90 80 L90 20 L75 20 L75 50 L25 20 Z" fill="rgb(var(--pattern-fill))"/>
      </g>
      <!-- Decorative dots -->
      <circle cx="50" cy="50" r="2" fill="rgb(var(--pattern-fill))" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#nokiatisPattern)"/>
</svg>
